# Production — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  backend:
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  celery-worker:
    restart: unless-stopped

  celery-beat:
    restart: unless-stopped

  flower:
    profiles:
      - never
