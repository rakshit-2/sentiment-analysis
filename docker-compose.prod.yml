services:
  redis:
    ports: !reset []

  backend:
    ports:
      - "127.0.0.1:8000:8000"
    volumes: !reset []
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]

  celery-worker:
    volumes: !reset []
    restart: unless-stopped

  celery-beat:
    volumes: !reset []
    restart: unless-stopped

  flower:
    profiles:
      - never
