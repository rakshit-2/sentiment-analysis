services:
  redis:
    image: redis:7-alpine
    container_name: sentiment-analysis-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sentiment-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentiment-analysis-backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env.local
    depends_on:
      redis:
        condition: service_healthy
    restart: "on-failure:1"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sentiment-network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentiment-analysis-celery-worker
    command: celery -A app.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env.local
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: "on-failure:1"
    networks:
      - sentiment-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentiment-analysis-celery-beat
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env.local
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    restart: "on-failure:1"
    networks:
      - sentiment-network

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentiment-analysis-flower
    command: celery -A app.celery_app flower --port=5555
    env_file:
      - ./backend/.env.local
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    restart: "on-failure:1"
    networks:
      - sentiment-network

networks:
  sentiment-network:
    driver: bridge

volumes:
  redis_data:
